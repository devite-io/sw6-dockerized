[supervisord]
logfile = /var/log/supervisord.log
loglevel = info
pidfile = /tmp/supervisord.pid
nodaemon = true
user=root

[program:php-fpm]
command=/usr/sbin/php-fpm8.4 --nodaemonize --fpm-config /etc/php/8.4/fpm/php-fpm.conf
user=nginx
autostart=true
autorestart=true

[program:sw-worker-scheduler]
process_name=%(program_name)s_%(process_num)02d
command=bash -c "php /usr/share/nginx/html/bin/console messenger:consume scheduler_shopware --time-limit=180 --memory-limit=512M"
environment=MESSENGER_CONSUMER_NAME=%(program_name)s_%(process_num)02d
directory=/usr/share/nginx/html
user=nginx
numprocs=1
startsecs=0
autostart=true
autorestart=true
startretries=10
stopwaitsecs=30

[program:sw-worker-async]
process_name=%(program_name)s_%(process_num)02d
command=bash -c "php /usr/share/nginx/html/bin/console messenger:consume async --time-limit=180 --memory-limit=512M"
environment=MESSENGER_CONSUMER_NAME=%(program_name)s_%(process_num)02d
directory=/usr/share/nginx/html
user=nginx
numprocs=2
startsecs=0
autostart=true
autorestart=true
startretries=10
stopwaitsecs=30

[program:sw-worker-low-priority]
process_name=%(program_name)s_%(process_num)02d
command=bash -c "php /usr/share/nginx/html/bin/console messenger:consume low_priority failed --time-limit=180 --memory-limit=512M"
environment=MESSENGER_CONSUMER_NAME=%(program_name)s_%(process_num)02d
directory=/usr/share/nginx/html
user=nginx
numprocs=1
startsecs=0
autostart=true
autorestart=true
startretries=10
stopwaitsecs=30

[program:sw-worker-scheduled]
process_name=%(program_name)s_%(process_num)02d
command=bash -c "php /usr/share/nginx/html/bin/console scheduled-task:run"
directory=/usr/share/nginx/html
user=nginx
numprocs=1
startsecs=0
autostart=true
autorestart=true
startretries=10
stopwaitsecs=30

[program:cron-daemon]
command=/usr/sbin/cron -f
user=root
autostart=true
autorestart=true

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
user=root
autostart=true
autorestart=true